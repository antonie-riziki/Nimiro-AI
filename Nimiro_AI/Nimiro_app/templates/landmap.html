<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#49ec13",
                        "background-light": "#f6f8f6",
                        "background-dark": "#152210",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .map-gradient {
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0) 60%, rgba(246, 248, 246, 1) 100%);
        }

        .polygon-overlay {
            background: rgba(73, 236, 19, 0.2);
            border: 2px solid #49ec13;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
    <div
        class="relative flex h-screen w-full flex-col overflow-hidden max-w-[430px] mx-auto bg-white dark:bg-slate-950 shadow-2xl">
        <!-- Header -->
        <div
            class="flex items-center bg-white dark:bg-slate-900 px-4 py-3 border-b border-slate-100 dark:border-slate-800 shrink-0">
            <button
                class="flex size-10 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <span class="material-symbols-outlined text-slate-600 dark:text-slate-300">arrow_back_ios_new</span>
            </button>
            <div class="flex-1 text-center">
                <h1 class="text-lg font-bold tracking-tight text-slate-900 dark:text-slate-50">Interactive Land Map</h1>
                <p class="text-[10px] uppercase tracking-widest text-slate-500 font-semibold">Plot ID: #KF-8821</p>
            </div>
            <button
                class="flex size-10 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <span class="material-symbols-outlined text-slate-600 dark:text-slate-300">layers</span>
            </button>
        </div>
        <!-- Main Map Area -->
        <div class="relative flex-1 bg-slate-200 overflow-hidden">
            <!-- Simulated Map Background -->
            <div class="absolute inset-0 bg-cover bg-center"
                data-alt="Aerial view of green agricultural farmland fields" data-location="Nairobi, Kenya"
                style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCjPsf_LgJO7DyS8ULJVyyEwFBK8c100PDp7jaz7o-qXqTYv85Pl9wgBa9kPT5TcfqaDUtSYcQM4SR8rxodCoDYosPH7ie_AbAVyTXQk10ExqwYLwRcjB1lJl2OT22ZuyVOSNlGGjqLkzT-HgrZEW5sY1TzD3IN0pzCcYFnwq4K9ZzcJebcTbKArY-KxmJAQvV1VdxKkxHIxJRl7k7FJXWfW1y5JCuk_I3doQ1DG9YXG_fwLSc1Lct9wev52Q18XuRwBUAZ5-umgq61')">
                <!-- Polygon Overlay -->
                <div
                    class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-48 polygon-overlay rounded-lg flex items-center justify-center">
                    <div
                        class="bg-white/90 dark:bg-slate-900/90 backdrop-blur-sm px-3 py-2 rounded-lg shadow-lg border border-primary/30">
                        <div class="flex items-center gap-2">
                            <span class="material-symbols-outlined text-primary text-sm">agriculture</span>
                            <span class="text-xs font-bold text-slate-800 dark:text-slate-100 tracking-tight">Corn Field
                                A</span>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Search Overlay -->
            <div class="absolute top-4 left-4 right-4 z-10">
                <label
                    class="flex items-center bg-white dark:bg-slate-800 rounded-xl shadow-xl border border-slate-200 dark:border-slate-700 px-4 py-2 gap-3">
                    <span class="material-symbols-outlined text-slate-400">search</span>
                    <input class="bg-transparent border-none focus:ring-0 text-sm w-full placeholder:text-slate-400"
                        placeholder="Search coordinates or plot ID" type="text" />
                    <span class="material-symbols-outlined text-primary">my_location</span>
                </label>
            </div>
            <!-- Map Controls -->
            <div class="absolute right-4 bottom-32 flex flex-col gap-2 z-10">
                <div
                    class="flex flex-col bg-white dark:bg-slate-800 rounded-xl shadow-xl border border-slate-200 dark:border-slate-700 overflow-hidden">
                    <button
                        class="p-3 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors border-b border-slate-100 dark:border-slate-700">
                        <span class="material-symbols-outlined text-slate-600 dark:text-slate-300">add</span>
                    </button>
                    <button class="p-3 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
                        <span class="material-symbols-outlined text-slate-600 dark:text-slate-300">remove</span>
                    </button>
                </div>
                <button class="bg-primary p-3 rounded-xl shadow-xl text-slate-900 flex items-center justify-center">
                    <span class="material-symbols-outlined font-bold">navigation</span>
                </button>
            </div>
            <!-- Layer Toggles -->
            <div class="absolute left-4 bottom-32 flex flex-col gap-2 z-10">
                <button
                    class="flex items-center gap-2 bg-white/90 dark:bg-slate-800/90 backdrop-blur-sm pl-2 pr-4 py-2 rounded-full shadow-lg border border-slate-200 dark:border-slate-700 group transition-all">
                    <div
                        class="size-8 rounded-full bg-primary/20 flex items-center justify-center text-primary group-active:scale-95">
                        <span class="material-symbols-outlined text-lg">water_drop</span>
                    </div>
                    <span class="text-xs font-semibold text-slate-700 dark:text-slate-200">Irrigation</span>
                    <div class="w-8 h-4 bg-primary rounded-full relative ml-auto">
                        <div class="absolute right-0.5 top-0.5 size-3 bg-white rounded-full"></div>
                    </div>
                </button>
                <button
                    class="flex items-center gap-2 bg-white/90 dark:bg-slate-800/90 backdrop-blur-sm pl-2 pr-4 py-2 rounded-full shadow-lg border border-slate-200 dark:border-slate-700 group transition-all">
                    <div
                        class="size-8 rounded-full bg-orange-100 flex items-center justify-center text-orange-600 group-active:scale-95">
                        <span class="material-symbols-outlined text-lg">bug_report</span>
                    </div>
                    <span class="text-xs font-semibold text-slate-700 dark:text-slate-200">Pest Alerts</span>
                    <div class="w-8 h-4 bg-slate-300 dark:bg-slate-600 rounded-full relative ml-auto">
                        <div class="absolute left-0.5 top-0.5 size-3 bg-white rounded-full shadow-sm"></div>
                    </div>
                </button>
            </div>
        </div>
        <!-- Plot Details Sheet (Persistent) -->
        <div class="bg-white dark:bg-slate-900 rounded-t-3xl shadow-[0_-10px_30px_-15px_rgba(0,0,0,0.3)] z-20 shrink-0">
            <div class="flex h-1.5 w-12 mx-auto mt-3 rounded-full bg-slate-200 dark:bg-slate-700"></div>
            <div class="p-5">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h2 class="text-xl font-bold text-slate-900 dark:text-slate-50">Plot Summary</h2>
                        <p class="text-sm text-slate-500">Last updated: 2 hours ago</p>
                    </div>
                    <span
                        class="px-3 py-1 bg-primary/20 text-primary text-xs font-bold rounded-full border border-primary/30">Healthy</span>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div
                        class="bg-background-light dark:bg-slate-800/50 p-4 rounded-2xl border border-slate-100 dark:border-slate-800">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="material-symbols-outlined text-slate-400 text-sm">square_foot</span>
                            <span class="text-[10px] font-bold uppercase tracking-wider text-slate-500">Acreage</span>
                        </div>
                        <p class="text-lg font-bold text-slate-900 dark:text-slate-50">12.4 <span
                                class="text-sm font-medium text-slate-500">Acres</span></p>
                    </div>
                    <div
                        class="bg-background-light dark:bg-slate-800/50 p-4 rounded-2xl border border-slate-100 dark:border-slate-800">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="material-symbols-outlined text-slate-400 text-sm">grass</span>
                            <span class="text-[10px] font-bold uppercase tracking-wider text-slate-500">Current
                                Crop</span>
                        </div>
                        <p class="text-lg font-bold text-slate-900 dark:text-slate-50">Yellow Corn</p>
                    </div>
                </div>
            </div>
        </div>
        <!-- Bottom Navigation Bar -->
        <div
            class="flex gap-2 border-t border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 px-4 pb-8 pt-2 shrink-0">
            <a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500"
                href="#">
                <span class="material-symbols-outlined">dashboard</span>
                <p class="text-[10px] font-medium leading-normal tracking-tight">Home</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">map</span>
                <p class="text-[10px] font-medium leading-normal tracking-tight">Mapping</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500"
                href="#">
                <span class="material-symbols-outlined">analytics</span>
                <p class="text-[10px] font-medium leading-normal tracking-tight">Soil Data</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500"
                href="#">
                <span class="material-symbols-outlined">shopping_cart</span>
                <p class="text-[10px] font-medium leading-normal tracking-tight">Market</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500"
                href="#">
                <span class="material-symbols-outlined">settings</span>
                <p class="text-[10px] font-medium leading-normal tracking-tight">Settings</p>
            </a>
        </div>
    </div>
</body>

</html>
