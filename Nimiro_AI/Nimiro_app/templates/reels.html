<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Reels</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#2D4F35", // Deep Earthy Green
                        secondary: "#9BC53D", // Fresh Leaf Green
                        accent: "#FFB800", // Sun Gold
                        "background-light": "#F8F9FA",
                        "background-dark": "#121212",
                        "card-light": "#FFFFFF",
                        "card-dark": "#1E1E1E",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                        body: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "16px",
                    },
                },
            },
        };

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
</head>

<body class="bg-black font-body antialiased overflow-hidden h-screen flex flex-col">
    <div class="flex h-screen overflow-hidden">
        <!-- Desktop Sidebar -->
        {% include 'sidebar.html' %}


        <!-- Main Content: Reels Feed -->
        <!-- <main class="flex-1 relative overflow-hidden h-full"> -->

        <!-- Scroll Container -->
        <div class="h-screen overflow-y-scroll snap-y snap-mandatory">
            {% for reel in reels %}
            <!-- Video Background Container -->
            <div class="absolute inset-0 w-full h-full bg-slate-900">
                <video class="w-full h-full object-cover" autoplay loop muted playsinline>
                    <source src="{{ reel.video_url }}" type="video/mp4">
                </video>
            </div>

            <!-- Content Overlay -->
            <div class="absolute inset-0 flex flex-col justify-end bg-gradient-to-t-overlay pb-24">
                <div class="flex flex-row items-end px-4 gap-4 mb-6">

                    <!-- Left Side: Content Info -->
                    <div class="flex-1 space-y-4">

                        <!-- Farmer Profile -->
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 rounded-full border-2 border-[#86A673] overflow-hidden">
                                <img alt="Farmer Avatar" class="w-full h-full object-cover"
                                    src="https://via.placeholder.com/150" />
                            </div>
                            <div>
                                <p class="text-[#E8F5E9] font-bold text-shadow-md">
                                    {{ reel.creator }}
                                </p>
                                <button
                                    class="text-[10px] font-bold bg-[#86A673] text-[#1B2B1E] px-3 py-0.5 rounded-full uppercase mt-0.5">
                                    Follow
                                </button>
                            </div>
                        </div>

                        <!-- Caption & Hashtags -->
                        <div class="space-y-1">
                            <p class="text-white text-sm text-shadow-md line-clamp-2">
                                {{ reel.summary }}
                            </p>

                            <div class="flex flex-wrap gap-2">
                                {% for tag in reel.hashtags %}
                                <span class="text-[#86A673] font-bold text-xs text-shadow-md">
                                    #{{ tag }}
                                </span>
                                {% endfor %}
                            </div>
                        </div>

                        <!-- Audio Scroll -->
                        <div class="flex items-center gap-2 overflow-hidden max-w-[200px]">
                            <span class="material-icons-round text-white text-sm">music_note</span>
                            <div class="whitespace-nowrap">
                                <p class="text-white text-xs animate-pulse">
                                    {{ reel.title }}
                                </p>
                            </div>
                        </div>
                    </div>

                    <!-- Right Side: Engagement Buttons -->
                    <div class="flex flex-col items-center gap-6 pb-2">

                        <!-- Like -->
                        <button
                            class="flex flex-col items-center hover:opacity-80 transition-opacity active:scale-90 duration-100">
                            <div class="p-2">
                                <span class="material-icons-round text-white text-3xl text-shadow-md"
                                    style="font-variation-settings: 'FILL' 1;">favorite</span>
                            </div>
                            <span class="text-white text-xs font-bold text-shadow-md">
                                {{ reel.likes }}
                            </span>
                        </button>

                        <!-- Comment -->
                        <button
                            class="flex flex-col items-center hover:opacity-80 transition-opacity active:scale-90 duration-100">
                            <div class="p-2">
                                <span class="material-icons-round text-white text-3xl text-shadow-md"
                                    style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
                            </div>
                            <span class="text-white text-xs font-bold text-shadow-md">
                                {{ reel.comments }}
                            </span>
                        </button>

                        <!-- Share -->
                        <button
                            class="flex flex-col items-center hover:opacity-80 transition-opacity active:scale-90 duration-100">
                            <div class="p-2">
                                <span class="material-icons-round text-white text-3xl text-shadow-md">share</span>
                            </div>
                            <span class="text-white text-xs font-bold text-shadow-md">
                                {{ reel.shares }}
                            </span>
                        </button>

                        <!-- More -->
                        <button class="flex flex-col items-center hover:opacity-80 transition-opacity">
                            <div class="p-2">
                                <span class="material-icons-round text-white text-3xl text-shadow-md">more_vert</span>
                            </div>
                        </button>

                        <!-- Vinyl Disk -->
                        <div
                            class="w-8 h-8 rounded-full border-2 border-white/40 overflow-hidden animate-spin shadow-lg">
                            <img alt="Audio Disc" class="w-full h-full object-cover"
                                src="https://via.placeholder.com/50" />
                        </div>
                    </div>

                </div>
            </div>
            {% endfor %}
        </div>
        <!-- </main> -->
        <!-- BottomNavBar -->
        {% include 'bottom_nav.html' %}

    </div>
</body>

</html>
