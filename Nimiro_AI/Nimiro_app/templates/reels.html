<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&amp;family=Inter:wght@400;500&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {},
                    fontFamily: {
                        "headline": ["Public Sans", "serif"],
                        "body": ["Public Sans", "sans-serif"],
                        "label": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .text-shadow-md {
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        }

        .bg-gradient-to-t-overlay {
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0.4) 40%, rgba(0, 0, 0, 0) 100%);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-black font-body antialiased overflow-hidden h-screen flex flex-col">
    <div class="flex h-screen overflow-hidden">
        <!-- Desktop Sidebar -->
        {% include 'sidebar.html' %}

        <!-- TopAppBar -->
        <header class="bg-[#1B2B1E] shadow-sm flex justify-between items-center w-full px-4 h-16 fixed top-0 z-50">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-[#86A673]">agriculture</span>
                <h1 class="font-serif text-xl font-bold text-[#E8F5E9] tracking-tight uppercase">FarmFlow</h1>
            </div>
            <div class="flex items-center">
                <button class="hover:opacity-80 transition-opacity p-2">
                    <span class="material-symbols-outlined text-[#86A673]">notifications</span>
                </button>
            </div>
        </header>
        <!-- Main Content: Reels Feed -->
        <main class="flex-1 relative overflow-hidden h-full">
            <!-- Video Background Container -->
            <div class="absolute inset-0 w-full h-full bg-slate-900">
                <img alt="Farmer holding rich organic soil" class="w-full h-full object-cover"
                    data-alt="Farmer showing a handful of dark fertile soil"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuDpB9u-ZVKf3hHrMmuQXqCDAtjQgHlQ9AusiyC2oyDAtSRZL0JcoyXt22eGJua6z4TJeZ1BdWaOmJwfPDf1Hq_GFnjSKpDGAJCQVAN6Y_kXq29vI6eWFDvoUcw4Lj9QXf_enrcY6VoOaM1yFk3LlHC1n0PBU9TmBeMZ76mYuuU4MTDxMeWFzlUpJwFT_a4iMCNsAE8neL6HrUOG89EdVxXk0YeT7rqHTni0Zdk51RtJlqwJcn5jX9RaQjPJEkbWPHUtAM3TYzUZSxFk" />
            </div>
            <!-- Content Overlay -->
            <div class="absolute inset-0 flex flex-col justify-end bg-gradient-to-t-overlay pb-24">
                <div class="flex flex-row items-end px-4 gap-4 mb-6">
                    <!-- Left Side: Content Info -->
                    <div class="flex-1 space-y-4">
                        <!-- Farmer Profile -->
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 rounded-full border-2 border-[#86A673] overflow-hidden">
                                <img alt="Farmer Avatar" class="w-full h-full object-cover"
                                    data-alt="Portrait of a smiling organic farmer"
                                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuAFS8Up1bdxSkePNuXxo7kpOFZCMNzErw9ZQcB6nYQRWVMPfSjKvXNz2IBkfrMUXT2YkJ6Q142nW6moDw2lJM_ZCs_3fLZfHw8IQADlttJvbzynqiUVOtqhd_LwejI94QVfMtz0v0U542iQCj3RgNNY7YJ1xwE51pukH_FYr8V2X_x66p6Viq0OsvXYc5RXBMD6CLWUzMam2N9igRom2HwqoWS-7Iu0dD2UPbCErlSztaKHF8KEOMb9boLIbl0fD3lran5x4YSC_qTt" />
                            </div>
                            <div>
                                <p class="text-[#E8F5E9] font-bold text-shadow-md">GreenThumb_Joe</p>
                                <button
                                    class="text-[10px] font-bold bg-[#86A673] text-[#1B2B1E] px-3 py-0.5 rounded-full uppercase mt-0.5">Follow</button>
                            </div>
                        </div>
                        <!-- Caption & Hashtags -->
                        <div class="space-y-1">
                            <p class="text-white text-sm text-shadow-md line-clamp-2">
                                The secret is in the testing! Just finished a PH test on the north ridge. Ready for the
                                maize cycle. 🌱🌽
                            </p>
                            <div class="flex flex-wrap gap-2">
                                <span class="text-[#86A673] font-bold text-xs text-shadow-md">#HealthySoil</span>
                                <span class="text-[#86A673] font-bold text-xs text-shadow-md">#MaizeHarvest</span>
                                <span class="text-[#86A673] font-bold text-xs text-shadow-md">#OrganicFarming</span>
                            </div>
                        </div>
                        <!-- Audio Scroll -->
                        <div class="flex items-center gap-2 overflow-hidden max-w-[200px]">
                            <span class="material-symbols-outlined text-white text-sm">music_note</span>
                            <div class="whitespace-nowrap">
                                <p class="text-white text-xs animate-pulse">Original Audio - Rural Morning Rhythms</p>
                            </div>
                        </div>
                    </div>
                    <!-- Right Side: Engagement Buttons -->
                    <div class="flex flex-col items-center gap-6 pb-2">
                        <!-- Like -->
                        <button
                            class="flex flex-col items-center hover:opacity-80 transition-opacity active:scale-90 duration-100">
                            <div class="p-2">
                                <span class="material-symbols-outlined text-white text-3xl text-shadow-md"
                                    style="font-variation-settings: 'FILL' 1;">favorite</span>
                            </div>
                            <span class="text-white text-xs font-bold text-shadow-md">24.5k</span>
                        </button>
                        <!-- Comment -->
                        <button
                            class="flex flex-col items-center hover:opacity-80 transition-opacity active:scale-90 duration-100">
                            <div class="p-2">
                                <span class="material-symbols-outlined text-white text-3xl text-shadow-md"
                                    style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
                            </div>
                            <span class="text-white text-xs font-bold text-shadow-md">1.2k</span>
                        </button>
                        <!-- Share -->
                        <button
                            class="flex flex-col items-center hover:opacity-80 transition-opacity active:scale-90 duration-100">
                            <div class="p-2">
                                <span class="material-symbols-outlined text-white text-3xl text-shadow-md">share</span>
                            </div>
                            <span class="text-white text-xs font-bold text-shadow-md">Share</span>
                        </button>
                        <!-- More -->
                        <button class="flex flex-col items-center hover:opacity-80 transition-opacity">
                            <div class="p-2">
                                <span
                                    class="material-symbols-outlined text-white text-3xl text-shadow-md">more_vert</span>
                            </div>
                        </button>
                        <!-- Vinyl Disk placeholder -->
                        <div
                            class="w-8 h-8 rounded-full border-2 border-white/40 overflow-hidden animate-spin shadow-lg">
                            <img alt="Audio Disc" class="w-full h-full object-cover"
                                data-alt="Rotating farm audio disc thumbnail"
                                src="https://lh3.googleusercontent.com/aida-public/AB6AXuCZSMkP6pCcpRsEhzTpI_SPaZi-77wy5s7jByLBIeJHFc_AZEEp7Dg1zXt1zAKBGWXUXHUU-iIU64KmTVEw48n6ZdvDu5JQKt5CNN90w49PkKBDw2Cp4HDz84oIls8ErumbMtzyTVkzxJxUDpFIz9GLnLP3ZBi0zodMS2nmSr9lVHcwk2GYQK7KDiZ0C_BfM7GKPq8-GZQoroMeRgJ-XE9DvLzRf998GyRm99rifha3HDt8wQSRtohXbCg_i6XnpzJXp3HayMU9m5kr" />
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <!-- BottomNavBar -->
        {% include 'bottom_nav.html' %}

    </div>
</body>

</html>
